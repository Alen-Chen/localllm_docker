services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:ollama
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - open-webui:/app/backend/data
      - ollama:/root/.ollama
    ports:
      - "8080:8080"
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-bridge
    restart: unless-stopped

volumes:
  open-webui:
  ollama:

networks:
  ai-bridge:
    driver: bridge
